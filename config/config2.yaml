models:
  # For prompt generation/optimization (--opt_model_name)
  "gpt-4o-mini":
    api_type: "openai"
    base_url: "https://openrouter.ai/api/v1"
    api_key: "YOUR_OPENROUTER_API_KEY_HERE"
    model: "openai/gpt-4o-mini"
    temperature: 0.5

  # For workflow execution/evaluation (--exec_model_name)
  # If both roles use gpt-4o-mini, this entry can be removed
  "gpt-4o-mini-exec":
    api_type: "openai"
    base_url: "https://openrouter.ai/api/v1"
    api_key: "YOUR_OPENROUTER_API_KEY_HERE"
    model: "openai/gpt-4o-mini"
    temperature: 0
